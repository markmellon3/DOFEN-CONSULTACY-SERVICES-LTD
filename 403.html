<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied | MarkMellon Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">
    <div class="max-w-lg mx-auto px-6 text-center">
        <div class="inline-flex items-center justify-center w-28 h-28 bg-red-500/10 rounded-full mb-8">
            <i class="fas fa-ban text-6xl text-red-500"></i>
        </div>
        
        <h1 class="text-7xl font-black tracking-tighter mb-4">403</h1>
        <h2 class="text-4xl font-bold mb-6">Access Denied</h2>
        
        <p class="text-zinc-400 text-lg mb-10">
            You do not have permission to access this secure area.<br>
            This page is restricted to authorized personnel only.
        </p>

        <div class="glass-card p-8 rounded-3xl mb-10 text-left text-sm">
            <p class="font-medium text-amber-500 mb-3">SECURITY NOTICE</p>
            <p class="text-zinc-400">
                All access attempts are logged and monitored by our security operations center.
            </p>
        </div>

        <a href="homepage.html" 
           class="inline-flex items-center gap-3 px-10 py-5 bg-amber-500 hover:bg-amber-400 text-black font-semibold rounded-3xl transition-all">
            <i class="fas fa-home"></i> RETURN TO HOMEPAGE
        </a>
    </div>
</body>
</html>
